<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>槐梦 - 立体金属流光卡牌</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');

        :root {
            /* 霓虹发光色 */
            --neon-core: #f0abfc;
            --neon-base: #d946ef;
            --neon-deep: #701a75;
            --neon-blue: #06b6d4;
            
            /* 金属质感配色体系 */
            --metal-light: #4a4a5a;
            --metal-base: #22222a;
            --metal-dark: #0a0a0c;
            --metal-highlight: rgba(255, 255, 255, 0.15);
        }

        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            perspective: 1200px; /* 强化 3D 透视深度 */
        }

        /* 环境光与粒子底图 */
        .ambient-bg {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 50% 50%, rgba(217, 70, 239, 0.12) 0%, transparent 65%),
                url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.04"/></svg>');
            z-index: 0;
        }

        .pulse-light {
            position: absolute;
            width: 500px;
            height: 700px;
            background: var(--neon-base);
            filter: blur(160px);
            opacity: 0.25;
            animation: pulse 4s ease-in-out infinite alternate;
            z-index: 1;
        }

        @keyframes pulse {
            0% { opacity: 0.15; transform: scale(0.95); }
            100% { opacity: 0.35; transform: scale(1.05); }
        }

        /* --- 核心：3D 悬浮摇曳动画 --- */
        .card-container {
            width: 420px;
            height: 600px;
            position: relative;
            z-index: 10;
            transform-style: preserve-3d;
            /* 左右轻微摇摆与上下浮动 */
            animation: subtleSway 8s ease-in-out infinite;
        }

        @keyframes subtleSway {
            0% { transform: rotateY(-12deg) rotateX(4deg) translateY(0px); }
            50% { transform: rotateY(12deg) rotateX(-2deg) translateY(-12px); }
            100% { transform: rotateY(-12deg) rotateX(4deg) translateY(0px); }
        }

        .card-front-wrapper {
            position: absolute;
            inset: 0;
            transform-style: preserve-3d;
            /* 利用 drop-shadow 模拟底座的厚度倒角和外发光 */
            filter: 
                drop-shadow(-3px 3px 0px rgba(255,255,255,0.1)) 
                drop-shadow(-5px 5px 0px rgba(0,0,0,0.8)) 
                drop-shadow(0 0 25px rgba(217, 70, 239, 0.6));
        }

        /* 1. 底层流光能量条 */
        .energy-flow-layer {
            position: absolute;
            inset: -4px; 
            background: conic-gradient(
                from 0deg at 50% 50%, 
                var(--neon-deep) 0%, 
                var(--metal-dark) 20%, 
                var(--neon-blue) 40%, 
                var(--metal-dark) 60%, 
                var(--neon-base) 80%,
                var(--neon-deep) 100%
            );
            animation: spin 4s linear infinite;
            clip-path: polygon(20px 0, 100% 0, 100% 100%, 0 100%, 0 300px, 25px 280px, 25px 200px, 0 180px, 0 20px);
            z-index: 1;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* 2. 重金属装甲遮罩 (带立体倒角和金属渐变) */
        .inner-armor-mask {
            position: absolute;
            inset: 3px; /* 流光边框粗细 */
            /* 复杂的金属光泽渐变 */
            background: linear-gradient(135deg, 
                var(--metal-light) 0%, 
                var(--metal-base) 25%, 
                var(--metal-dark) 50%, 
                #000 75%, 
                var(--metal-light) 100%
            );
            clip-path: polygon(20px 0, 100% 0, 100% 100%, 0 100%, 0 300px, 25px 280px, 25px 200px, 0 180px, 0 20px);
            z-index: 2;
        }

        /* 3. 内嵌屏幕金属斜坡 (制造中间图片的深陷感) */
        .armor-bevel {
            position: absolute;
            inset: 22px 42px 22px 47px;
            background: #000;
            z-index: 3;
            /* 内部阴影制造凹陷立体感 */
            box-shadow: 
                inset 0px 5px 10px rgba(0,0,0,0.9),
                inset 0px -2px 5px rgba(255,255,255,0.2),
                0 0 0 1px var(--metal-light); /* 金属内细边 */
            border-radius: 6px;
        }

        /* 4. 金属动态高光层 (配合摇摆动画移动的反光) */
        .metal-glare {
            position: absolute;
            inset: 0;
            background: linear-gradient(105deg, 
                transparent 20%, 
                rgba(255,255,255,0.05) 25%, 
                rgba(255,255,255,0.2) 30%, 
                rgba(255,255,255,0.05) 35%, 
                transparent 40%
            );
            background-size: 200% 100%;
            z-index: 4;
            clip-path: polygon(20px 0, 100% 0, 100% 100%, 0 100%, 0 300px, 25px 280px, 25px 200px, 0 180px, 0 20px);
            animation: glareMove 8s ease-in-out infinite;
            pointer-events: none;
            mix-blend-mode: overlay;
        }

        @keyframes glareMove {
            0% { background-position: 150% 0; }
            50% { background-position: -50% 0; }
            100% { background-position: 150% 0; }
        }

        /* 中心人物图片 */
        .character-img {
            position: absolute;
            inset: 25px 45px 25px 50px;
            width: calc(100% - 95px);
            height: calc(100% - 50px);
            object-fit: cover;
            filter: contrast(1.15) saturate(1.3) brightness(1.05);
            border-radius: 4px;
            z-index: 5;
        }

        /* 屏幕内部流光线与故障纹理 */
        .screen-glitch {
            position: absolute;
            inset: 25px 45px 25px 50px;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1), rgba(0,0,0,0.1) 1px, transparent 1px, transparent 2px);
            z-index: 6;
            pointer-events: none;
        }

        .hologram-scan {
            position: absolute;
            inset: 25px 45px;
            background: linear-gradient(to bottom, transparent 0%, rgba(217, 70, 239, 0.5) 50%, rgba(255, 255, 255, 0.9) 55%, rgba(6, 182, 212, 0.5) 60%, transparent 100%);
            height: 8px;
            z-index: 10;
            animation: scanLine 3s ease-in-out infinite alternate;
            pointer-events: none;
            box-shadow: 0 0 15px var(--neon-base);
            mix-blend-mode: screen;
        }

        @keyframes scanLine {
            0% { top: 25px; }
            100% { top: calc(100% - 33px); }
        }

        /* --- UI 数据与高光文字 --- */
        .ui-layer {
            position: absolute;
            inset: 0;
            z-index: 12;
            color: #fff;
            transform: translateZ(20px); /* 让文字在 3D 空间中微微浮起 */
        }

        [contenteditable="true"] {
            outline: none;
            cursor: text;
            transition: all 0.2s;
        }
        [contenteditable="true"]:focus {
            background: rgba(217, 70, 239, 0.4);
            border-radius: 4px;
            text-shadow: none;
        }

        .tech-badge {
            position: absolute;
            left: 8px;
            top: 220px;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            letter-spacing: 6px;
            color: var(--neon-core);
            text-shadow: 0 0 5px var(--neon-base), 0 0 15px var(--neon-base);
            opacity: 0.9;
        }

        .data-stream {
            position: absolute;
            right: 15px;
            top: 40px;
            font-size: 10px;
            text-align: right;
            line-height: 1.6;
            color: var(--neon-blue);
            text-shadow: 0 0 5px var(--neon-blue);
            font-weight: bold;
        }

        .name-base {
            position: absolute;
            bottom: 30px;
            left: 45px;
            width: calc(100% - 90px);
            background: linear-gradient(90deg, transparent, rgba(217, 70, 239, 0.3), transparent);
            padding: 8px 0;
            border-top: 1px solid rgba(217, 70, 239, 0.8);
            border-bottom: 1px solid rgba(6, 182, 212, 0.8);
            box-shadow: 0 0 15px rgba(217, 70, 239, 0.5);
            backdrop-filter: blur(2px);
        }

        .name-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 34px;
            font-weight: 900;
            color: #fff;
            text-align: center;
            text-shadow: 0 0 8px #fff, 0 0 20px var(--neon-base), 0 0 40px var(--neon-deep);
            letter-spacing: 4px;
            animation: textFlicker 5s infinite alternate;
        }

        @keyframes textFlicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; text-shadow: 0 0 8px #fff, 0 0 20px var(--neon-base); }
            20%, 24%, 55% { opacity: 0.7; text-shadow: 0 0 2px var(--neon-base); }
        }

        .sub-data {
            position: absolute;
            bottom: 12px;
            left: 45px;
            width: calc(100% - 90px);
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            color: #ccc;
            text-shadow: 0 0 4px var(--neon-blue);
            font-weight: bold;
        }

        #imageInput { display: none; }
        
        .hint {
            position: fixed;
            bottom: 25px;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            letter-spacing: 2px;
            text-align: center;
            width: 100%;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <input type="file" id="imageInput" accept="image/*">

    <div class="ambient-bg"></div>
    <div class="pulse-light"></div>

    <div class="card-container" id="cardContainer">
        
        <div class="card-front-wrapper">
            
            <div class="energy-flow-layer"></div>
            <div class="inner-armor-mask"></div>
            <div class="metal-glare"></div>
            <div class="armor-bevel"></div>

            <img src="https://images.unsplash.com/photo-1618331835717-801e976710b2?q=80&w=600&auto=format&fit=crop" id="characterImg" class="character-img" alt="槐梦">
            <div class="screen-glitch"></div>
            <div class="hologram-scan"></div>

            <div class="ui-layer">
                <div class="tech-badge" contenteditable="true">PANDORA BOX</div>

                <div class="data-stream" contenteditable="true">
                    SYNC RATE<br><span style="color:#fff">99.9%</span><br><br>
                    NEURAL LINK<br><span style="color:#fff">STABLE</span>
                </div>

                <div class="name-base">
                    <div class="name-text" contenteditable="true">HUAIMENG</div>
                </div>

                <div class="sub-data">
                    <div contenteditable="true">CLASS: S-TIER</div>
                    <div contenteditable="true">ID: Z-1001</div>
                </div>
            </div>
        </div>
    </div>

    <div class="hint">按 'I' 键换图 | 双击文字编辑</div>

    <script>
        const imageImg = document.getElementById('characterImg');
        const imageInput = document.getElementById('imageInput');
        const editableElements = document.querySelectorAll('[contenteditable="true"]');
        const cardContainer = document.getElementById('cardContainer');

        // 换图快捷键
        document.addEventListener('keydown', (e) => {
            if (document.activeElement.isContentEditable) return; 
            if (e.key.toLowerCase() === 'i') {
                imageInput.click();
            }
        });

        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    imageImg.src = event.target.result;
                }
                reader.readAsDataURL(file);
            }
            this.value = ''; 
        });

        // 优化编辑体验：点击文字时，停止摇摆并强制回正到 0 度
        editableElements.forEach(el => {
            el.addEventListener('focus', () => {
                // 停掉 CSS 动画
                cardContainer.style.animation = 'none';
                // 强制正面朝向
                cardContainer.style.transform = 'rotateY(0deg) rotateX(0deg) translateY(0px)'; 
                cardContainer.style.transition = 'transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1)';
            });
            el.addEventListener('blur', () => {
                // 恢复 CSS 动画
                cardContainer.style.transition = 'none';
                // 重新加上动画触发器
                void cardContainer.offsetWidth; // 触发重绘
                cardContainer.style.animation = 'subtleSway 8s ease-in-out infinite';
            });
        });
    </script>
</body>
</html>
